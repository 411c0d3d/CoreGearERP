name: CD

on:
  workflow_run:
    workflows: [ CI ]
    branches: [ main ]
    types: [ completed ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish src/Host/CoreGearERP.Host/CoreGearERP.Host.csproj --configuration Release --output ./publish

      # TODO: add deployment target steps here (Docker push, SSH deploy, etc.)
      - name: Deploy (stub)
        run: echo "Deployment target not yet configured."