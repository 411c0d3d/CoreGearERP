services:
  # Local development only. Never used in production.
  # In production, environment variables are injected at runtime by Azure Container Apps
  # or AKS from Azure Key Vault -- no credentials live in this file or any committed config.
  # Ensure appsettings.Development.json is in .gitignore before pushing to any remote.

  postgres:
    image: postgres:16-alpine
    container_name: coregear-postgres
    environment:
      POSTGRES_USER: coregear
      POSTGRES_PASSWORD: coregear123
      POSTGRES_DB: coregearerp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coregear -d coregearerp"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: coregear-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  coregearerp.host:
    image: coregearerp.host
    build:
      context: .
      dockerfile: CoreGearERP.Host/Dockerfile
    ports:
      - "5014:8080"
      - "5015:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__CoreGearERP: "Host=postgres;Port=5432;Database=coregearerp;Username=coregear;Password=coregear123"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data: